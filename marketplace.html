<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Кокос Маркет 🥥</title>
  <style>
    * { box-sizing: border-box; margin: 0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f7f3e9; min-height: 100vh; padding: 12px; }
    .app { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; flex-wrap: wrap; gap: 12px; }
    .logo { font-size: 32px; font-weight: 700; color: #5c3f2b; }
    .logo span:first-child { color: #6b4f3c; } .logo span:last-child { color: #d4a373; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-btn { background: #f1e9dd; border: none; font-size: 16px; font-weight: 500; color: #5c3f2b; cursor: pointer; padding: 10px 16px; border-radius: 30px; transition: 0.2s; }
    .nav-btn.active { background: #d4a373; color: white; }
    .user-icon { background: #f1e9dd; width: 48px; height: 48px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: none; }
    .content { margin-top: 24px; }
    .tab { display: none; }
    .tab.active { display: block; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
    .product-card { background: white; border-radius: 24px; padding: 16px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); border: 1px solid #e9dccd; }
    .product-image { width: 100%; height: 160px; object-fit: cover; border-radius: 16px; margin-bottom: 12px; background: #e9dccd; }
    .product-title { font-weight: 700; font-size: 18px; margin-bottom: 4px; color: #3f2e1f; }
    .product-price { font-weight: bold; color: #6b4f3c; margin-bottom: 8px; }
    .btn { background: #d4a373; color: white; border: none; padding: 12px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; width: 100%; }
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; font-weight: 500; color: #5c4432; margin-bottom: 6px; }
    .input-group input, .input-group textarea { width: 100%; padding: 14px; border: 2px solid #ddd2c4; border-radius: 24px; outline: none; background: white; }
    .add-form { background: white; border-radius: 32px; padding: 24px; max-width: 600px; margin: 0 auto; }
    .photo-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .photo-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 2px solid #d4a373; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <!-- ШАПКА -->
  <div class="header">
    <div class="logo"><span>КОКОС</span><span>МАРКЕТ</span></div>
    <div class="nav">
      <button class="nav-btn active" data-tab="home">🏠 Главная</button>
      <button class="nav-btn" data-tab="favorites">❤️ Избранное</button>
      <button class="nav-btn" data-tab="profile">👤 Профиль</button>
      <button class="nav-btn" data-tab="add">➕ Добавить</button>
    </div>
    <button class="user-icon" id="userIconBtn">👤</button>
  </div>

  <!-- КОНТЕНТ ВКЛАДОК -->
  <div class="content">
    <!-- Главная (каталог) -->
    <div id="home" class="tab active">
      <h2 style="color:#4e3927; margin-bottom:20px;">Все товары</h2>
      <div id="productsContainer" class="products-grid">
        <p style="color:#7f6b58;">Загрузка товаров...</p>
      </div>
    </div>

    <!-- Избранное -->
    <div id="favorites" class="tab">
      <h2 style="color:#4e3927; margin-bottom:20px;">Избранное</h2>
      <div id="favoritesContainer" class="products-grid">
        <p style="color:#7f6b58;">Вы пока ничего не добавили в избранное</p>
      </div>
    </div>

    <!-- Профиль -->
    <div id="profile" class="tab">
      <h2 style="color:#4e3927; margin-bottom:20px;">Мой профиль</h2>
      <div id="profileInfo" style="background:white; border-radius:24px; padding:20px; margin-bottom:24px;">
        <p>Загрузка данных...</p>
      </div>
      <h3 style="color:#4e3927; margin-bottom:16px;">Мои товары</h3>
      <div id="myProductsContainer" class="products-grid">
        <p style="color:#7f6b58;">Загрузка...</p>
      </div>
      <h3 style="color:#4e3927; margin:24px 0 16px;">Отклонённые товары</h3>
      <div id="rejectedContainer" class="products-grid">
        <p style="color:#7f6b58;">Загрузка...</p>
      </div>
    </div>

    <!-- Добавить товар -->
    <div id="add" class="tab">
      <div class="add-form">
        <h2 style="color:#4e3927; margin-bottom:24px;">➕ Добавить товар</h2>
        <div class="input-group">
          <label>Название</label>
          <input type="text" id="productTitle" placeholder="Кокосовый торт">
        </div>
        <div class="input-group">
          <label>Описание</label>
          <textarea id="productDesc" rows="3" placeholder="Подробное описание товара"></textarea>
        </div>
        <div class="input-group">
          <label>Характеристики</label>
          <input type="text" id="productSpecs" placeholder="Вес: 1 кг, Размер: 20 см">
        </div>
        <div class="input-group">
          <label>Цена (₽)</label>
          <input type="number" id="productPrice" placeholder="350">
        </div>
        <div class="input-group">
          <label>Откуда отправка</label>
          <input type="text" id="productLocation" placeholder="г. Москва, ул. Пальмовая, 5">
        </div>
        <div class="input-group">
          <label>Фото (до 5 шт.)</label>
          <input type="file" id="productPhotos" accept="image/*" multiple>
          <div id="photoPreview" class="photo-preview"></div>
        </div>
        <div class="agreement" style="display:flex; align-items:center; gap:10px; margin:20px 0;">
          <input type="checkbox" id="agreeCheckbox">
          <label for="agreeCheckbox">Я соглашаюсь с лицензионным соглашением Кокос</label>
        </div>
        <button class="btn" id="submitProductBtn">🚀 Отправить на модерацию</button>
        <div id="addMessage" style="margin-top:16px;"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://owoksgyuvgvdhqrqnuwf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93b2tzZ3l1dmd2ZGhxcnFudXdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDQ5MTQsImV4cCI6MjA5MTY4MDkxNH0.zhZWb041DDu7IH3_9_FC4cCqYerWz_NXUil5o1jvnVg';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Переключение вкладок
  const tabs = document.querySelectorAll('.tab');
  const navBtns = document.querySelectorAll('.nav-btn');
  navBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const tabId = btn.dataset.tab;
      navBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      tabs.forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
    });
  });

  // Заглушка для входа (позже добавим)
  console.log('Маркетплейс загружен, Supabase готов');
</script>
</body>
</html>
