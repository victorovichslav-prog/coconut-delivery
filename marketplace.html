<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Кокос Маркет 🥥</title>
  <style>
    * { box-sizing: border-box; margin: 0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f7f3e9; min-height: 100vh; padding: 12px; }
    .app { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; flex-wrap: wrap; gap: 12px; }
    .logo { font-size: 32px; font-weight: 700; color: #5c3f2b; }
    .logo span:first-child { color: #6b4f3c; } .logo span:last-child { color: #d4a373; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-btn { background: #f1e9dd; border: none; font-size: 16px; font-weight: 500; color: #5c3f2b; cursor: pointer; padding: 10px 16px; border-radius: 30px; transition: 0.2s; }
    .nav-btn.active { background: #d4a373; color: white; }
    .user-icon { background: #f1e9dd; width: 48px; height: 48px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: none; }
    .content { margin-top: 24px; }
    .tab { display: none; }
    .tab.active { display: block; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
    .product-card { background: white; border-radius: 24px; padding: 16px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); border: 1px solid #e9dccd; cursor: pointer; transition: transform 0.1s; }
    .product-card:hover { transform: scale(1.02); }
    .product-image { width: 100%; height: 160px; object-fit: cover; border-radius: 16px; margin-bottom: 12px; background: #e9dccd; }
    .product-title { font-weight: 700; font-size: 18px; margin-bottom: 4px; color: #3f2e1f; }
    .product-price { font-weight: bold; color: #6b4f3c; margin-bottom: 8px; }
    .btn { background: #d4a373; color: white; border: none; padding: 12px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; width: 100%; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; font-weight: 500; color: #5c4432; margin-bottom: 6px; }
    .input-group input, .input-group textarea { width: 100%; padding: 14px; border: 2px solid #ddd2c4; border-radius: 24px; outline: none; background: white; }
    .add-form { background: white; border-radius: 32px; padding: 24px; max-width: 600px; margin: 0 auto; }
    .photo-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .photo-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 2px solid #d4a373; }
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { background: white; max-width: 400px; width: 90%; border-radius: 32px; padding: 24px; max-height: 90vh; overflow-y: auto; }
    .profile-popup { position: absolute; top: 70px; right: 20px; background: white; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 20px; display: none; border: 1px solid #e9dccd; z-index: 50; }
    .profile-popup.show { display: block; }
    .logout-btn { background: #eee4da; border: none; padding: 12px; border-radius: 40px; width: 100%; font-weight: 600; cursor: pointer; }
    /* Карусель */
    .carousel { position: relative; margin-bottom: 16px; }
    .carousel-main { width: 100%; height: 250px; object-fit: contain; border-radius: 20px; background: #f3ede5; }
    .carousel-thumbs { display: flex; gap: 8px; margin-top: 8px; overflow-x: auto; }
    .carousel-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid transparent; }
    .carousel-thumb.active { border-color: #d4a373; }
    .carousel-nav { display: flex; justify-content: center; gap: 20px; margin-top: 8px; }
    .carousel-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #6b4f3c; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <!-- ШАПКА -->
  <div class="header">
    <div class="logo"><span>КОКОС</span><span>МАРКЕТ</span></div>
    <div class="nav">
      <button class="nav-btn active" data-tab="home">🏠 Главная</button>
      <button class="nav-btn" data-tab="favorites">❤️ Избранное</button>
      <button class="nav-btn" data-tab="profile">👤 Профиль</button>
      <button class="nav-btn" data-tab="add">➕ Добавить</button>
    </div>
    <div id="authArea">
      <button class="user-icon" id="loginBtn" style="display: flex;">👤</button>
      <button class="user-icon" id="userIconBtn" style="display: none;">👤</button>
    </div>
  </div>

  <!-- ВКЛАДКИ -->
  <div class="content">
    <div id="home" class="tab active">
      <h2 style="color:#4e3927; margin-bottom:20px;">Все товары</h2>
      <div id="productsContainer" class="products-grid">
        <p style="color:#7f6b58;">Войдите, чтобы увидеть товары</p>
      </div>
    </div>
    <div id="favorites" class="tab">
      <h2 style="color:#4e3927; margin-bottom:20px;">Избранное</h2>
      <div id="favoritesContainer" class="products-grid">
        <p style="color:#7f6b58;">Вы пока ничего не добавили в избранное</p>
      </div>
    </div>
    <div id="profile" class="tab">
      <h2 style="color:#4e3927; margin-bottom:20px;">Мой профиль</h2>
      <div id="profileInfo" style="background:white; border-radius:24px; padding:20px; margin-bottom:24px;">
        <p>Загрузка данных...</p>
      </div>
      <h3 style="color:#4e3927; margin-bottom:16px;">Мои товары</h3>
      <div id="myProductsContainer" class="products-grid">
        <p style="color:#7f6b58;">Загрузка...</p>
      </div>
      <h3 style="color:#4e3927; margin:24px 0 16px;">Отклонённые товары</h3>
      <div id="rejectedContainer" class="products-grid">
        <p style="color:#7f6b58;">Загрузка...</p>
      </div>
    </div>
    <div id="add" class="tab">
      <div class="add-form">
        <h2 style="color:#4e3927; margin-bottom:24px;">➕ Добавить товар</h2>
        <div class="input-group"><label>Название</label><input type="text" id="productTitle" placeholder="Кокосовый торт"></div>
        <div class="input-group"><label>Описание</label><textarea id="productDesc" rows="3" placeholder="Подробное описание товара"></textarea></div>
        <div class="input-group"><label>Характеристики</label><input type="text" id="productSpecs" placeholder="Вес: 1 кг, Размер: 20 см"></div>
        <div class="input-group"><label>Цена (₽)</label><input type="number" id="productPrice" placeholder="350"></div>
        <div class="input-group"><label>Откуда отправка</label><input type="text" id="productLocation" placeholder="г. Москва, ул. Пальмовая, 5"></div>
        <div class="input-group">
          <label>Фото (до 5 шт.)</label>
          <input type="file" id="productPhotos" accept="image/*" multiple>
          <div id="photoPreview" class="photo-preview"></div>
        </div>
        <div style="display:flex; align-items:center; gap:10px; margin:20px 0;">
          <input type="checkbox" id="agreeCheckbox">
          <label for="agreeCheckbox">Я соглашаюсь с лицензионным соглашением Кокос</label>
        </div>
        <button class="btn" id="submitProductBtn">🚀 Отправить на модерацию</button>
        <div id="addMessage" style="margin-top:16px;"></div>
      </div>
    </div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО ВХОДА -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2 style="color:#4e3927; margin-bottom:20px;">Вход в Кокос Маркет</h2>
      <div id="emailStep">
        <div class="input-group"><label>Твой Email</label><input type="email" id="loginEmail" placeholder="friend@example.com"></div>
        <div class="input-group"><label>Твоё имя</label><input type="text" id="loginNameInput" placeholder="Тимофей"></div>
        <button class="btn" id="sendCodeBtn">📧 Получить код</button>
        <div id="emailMessage" style="margin-top:12px;"></div>
      </div>
      <div id="codeStep" style="display:none;">
        <div class="input-group"><label>Код из письма (6 цифр)</label><input type="text" id="loginCode" placeholder="000000" maxlength="6"></div>
        <button class="btn" id="verifyCodeBtn">✅ Подтвердить</button>
        <div id="codeMessage" style="margin-top:12px;"></div>
        <p style="margin-top:20px; cursor:pointer;" id="backToEmailBtn">← Назад</p>
      </div>
    </div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО ТОВАРА -->
  <div id="productModal" class="modal">
    <div class="modal-content" style="max-width: 500px; padding: 20px;">
      <div style="display: flex; justify-content: flex-end; margin-bottom: 8px;">
        <button id="closeProductModal" style="background: none; border: none; font-size: 24px; cursor: pointer;">✕</button>
      </div>
      <div id="productDetailContent">
        <!-- Заполняется динамически -->
      </div>
    </div>
  </div>

  <!-- ПОПАП ПРОФИЛЯ -->
  <div class="profile-popup" id="profilePopup">
    <div style="font-weight:bold; font-size:18px; margin-bottom:10px;" id="profileName"></div>
    <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
  </div>
</div>

<script>
  (function(){
    const SUPABASE_URL = 'https://owoksgyuvgvdhqrqnuwf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93b2tzZ3l1dmd2ZGhxcnFudXdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDQ5MTQsImV4cCI6MjA5MTY4MDkxNH0.zhZWb041DDu7IH3_9_FC4cCqYerWz_NXUil5o1jvnVg';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentEmail = '';
    let pendingName = '';
    let selectedFiles = [];

    // DOM элементы входа
    const loginModal = document.getElementById('loginModal');
    const loginBtn = document.getElementById('loginBtn');
    const userIconBtn = document.getElementById('userIconBtn');
    const emailStep = document.getElementById('emailStep');
    const codeStep = document.getElementById('codeStep');
    const loginEmail = document.getElementById('loginEmail');
    const loginNameInput = document.getElementById('loginNameInput');
    const sendCodeBtn = document.getElementById('sendCodeBtn');
    const emailMessage = document.getElementById('emailMessage');
    const loginCode = document.getElementById('loginCode');
    const verifyCodeBtn = document.getElementById('verifyCodeBtn');
    const codeMessage = document.getElementById('codeMessage');
    const backToEmailBtn = document.getElementById('backToEmailBtn');
    const profilePopup = document.getElementById('profilePopup');
    const profileName = document.getElementById('profileName');
    const logoutBtn = document.getElementById('logoutBtn');

    // DOM формы добавления
    const productTitle = document.getElementById('productTitle');
    const productDesc = document.getElementById('productDesc');
    const productSpecs = document.getElementById('productSpecs');
    const productPrice = document.getElementById('productPrice');
    const productLocation = document.getElementById('productLocation');
    const productPhotos = document.getElementById('productPhotos');
    const photoPreview = document.getElementById('photoPreview');
    const agreeCheckbox = document.getElementById('agreeCheckbox');
    const submitProductBtn = document.getElementById('submitProductBtn');
    const addMessage = document.getElementById('addMessage');

    // Модальное окно товара
    const productModal = document.getElementById('productModal');
    const productDetailContent = document.getElementById('productDetailContent');
    const closeProductModal = document.getElementById('closeProductModal');

    // Предпросмотр фото
    productPhotos.addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      selectedFiles = files.slice(0, 5);
      photoPreview.innerHTML = '';
      selectedFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = document.createElement('img');
          img.src = ev.target.result;
          photoPreview.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    });

    // Переключение вкладок
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'home' && currentUser) {
          loadProducts();
        }
      });
    });

    // Показать модалку входа
    loginBtn.addEventListener('click', () => {
      loginModal.classList.add('show');
      emailStep.style.display = 'block';
      codeStep.style.display = 'none';
    });

    loginModal.addEventListener('click', (e) => {
      if (e.target === loginModal) loginModal.classList.remove('show');
    });

    // Отправка кода
    sendCodeBtn.addEventListener('click', async () => {
      const email = loginEmail.value.trim();
      const name = loginNameInput.value.trim();
      if (!email) { emailMessage.textContent = '❌ Введи почту'; return; }
      if (!name) { emailMessage.textContent = '❌ Введи имя'; return; }
      currentEmail = email;
      pendingName = name;
      emailMessage.textContent = '📤 Отправляю...';
      sendCodeBtn.disabled = true;
      const { error } = await supabase.auth.signInWithOtp({ email });
      if (error) {
        emailMessage.textContent = `❌ ${error.message}`;
        sendCodeBtn.disabled = false;
      } else {
        emailMessage.textContent = '✅ Код отправлен!';
        emailStep.style.display = 'none';
        codeStep.style.display = 'block';
        sendCodeBtn.disabled = false;
      }
    });

    // Подтверждение кода
    verifyCodeBtn.addEventListener('click', async () => {
      const code = loginCode.value.trim();
      if (code.length !== 6) { codeMessage.textContent = '❌ Введи 6 цифр'; return; }
      codeMessage.textContent = '🔄 Проверяю...';
      verifyCodeBtn.disabled = true;
      const { data, error } = await supabase.auth.verifyOtp({ email: currentEmail, token: code, type: 'email' });
      if (error) {
        codeMessage.textContent = `❌ ${error.message}`;
        verifyCodeBtn.disabled = false;
      } else {
        const user = data.user;
        if (user) {
          let { data: dbUser } = await supabase.from('users').select('*').eq('email', user.email).maybeSingle();
          if (!dbUser) {
            const { data: newUser } = await supabase.from('users').insert({ name: pendingName, email: user.email }).select().single();
            dbUser = newUser;
          } else {
            await supabase.from('users').update({ name: pendingName }).eq('id', dbUser.id);
            dbUser.name = pendingName;
          }
          currentUser = dbUser;
          localStorage.setItem('coconutUserId', dbUser.id);
          localStorage.setItem('coconutUserName', dbUser.name);
          loginBtn.style.display = 'none';
          userIconBtn.style.display = 'flex';
          profileName.textContent = dbUser.name;
          loginModal.classList.remove('show');
          emailStep.style.display = 'block';
          codeStep.style.display = 'none';
          loginEmail.value = '';
          loginNameInput.value = '';
          loginCode.value = '';
          loadProducts();
        }
      }
    });

    backToEmailBtn.addEventListener('click', () => {
      emailStep.style.display = 'block';
      codeStep.style.display = 'none';
    });

    userIconBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      profilePopup.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
      if (!userIconBtn.contains(e.target) && !profilePopup.contains(e.target)) {
        profilePopup.classList.remove('show');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await supabase.auth.signOut();
      currentUser = null;
      localStorage.clear();
      loginBtn.style.display = 'flex';
      userIconBtn.style.display = 'none';
      profilePopup.classList.remove('show');
      document.getElementById('productsContainer').innerHTML = '<p style="color:#7f6b58;">Войдите, чтобы увидеть товары</p>';
    });

    // ---------- ЗАГРУЗКА ТОВАРОВ ----------
    async function loadProducts() {
      const container = document.getElementById('productsContainer');
      if (!container) return;
      container.innerHTML = '<p style="color:#7f6b58;">Загрузка товаров...</p>';
      
      const { data, error } = await supabase
        .from('products')
        .select('*')
        .order('created_at', { ascending: false });
      
      if (error) {
        container.innerHTML = '<p style="color:#c44;">Ошибка загрузки</p>';
        console.error(error);
        return;
      }
      
      if (!data || data.length === 0) {
        container.innerHTML = '<p style="color:#7f6b58;">Товаров пока нет</p>';
        return;
      }
      
      let html = '';
      data.forEach(product => {
        const imageUrl = product.image_urls && product.image_urls.length > 0 
          ? product.image_urls[0] 
          : 'https://via.placeholder.com/300x200?text=🥥';
        html += `
          <div class="product-card" data-product-id="${product.id}">
            <img class="product-image" src="${imageUrl}" alt="${product.title}">
            <div class="product-title">${product.title}</div>
            <div class="product-price">${product.price} ₽</div>
            <div style="font-size:14px; color:#7f6b58; margin-bottom:12px;">📍 ${product.location}</div>
            <button class="btn">🛒 Заказать</button>
          </div>
        `;
      });
      container.innerHTML = html;
      
      // Добавляем обработчики клика на карточки
      document.querySelectorAll('.product-card').forEach(card => {
        card.addEventListener('click', async (e) => {
          // Если кликнули прямо на кнопку, не открываем карточку (кнопка обработается отдельно)
          if (e.target.tagName === 'BUTTON') return;
          const productId = card.dataset.productId;
          await showProductDetails(productId);
        });
        
        // Отдельно обработчик для кнопки "Заказать"
        const btn = card.querySelector('.btn');
        if (btn) {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            alert('Переход к оформлению заказа пока не готов');
          });
        }
      });
    }

    // ---------- ПОКАЗ ДЕТАЛЕЙ ТОВАРА ----------
    async function showProductDetails(productId) {
      const { data: product, error } = await supabase
        .from('products')
        .select('*')
        .eq('id', productId)
        .single();
      
      if (error || !product) {
        alert('Товар не найден');
        return;
      }
      
      const images = product.image_urls && product.image_urls.length > 0 
        ? product.image_urls 
        : ['https://via.placeholder.com/400x300?text=🥥'];
      
      let currentImageIndex = 0;
      
      function renderCarousel() {
        return `
          <div class="carousel">
            <img class="carousel-main" src="${images[currentImageIndex]}" alt="${product.title}">
            ${images.length > 1 ? `
              <div class="carousel-nav">
                <button class="carousel-btn" id="prevImage">←</button>
                <span style="padding: 0 10px;">${currentImageIndex+1} / ${images.length}</span>
                <button class="carousel-btn" id="nextImage">→</button>
              </div>
              <div class="carousel-thumbs">
                ${images.map((url, idx) => `
                  <img class="carousel-thumb ${idx === currentImageIndex ? 'active' : ''}" 
                       src="${url}" data-index="${idx}">
                `).join('')}
              </div>
            ` : ''}
          </div>
        `;
      }
      
      function renderContent() {
        const carouselHtml = renderCarousel();
        return `
          ${carouselHtml}
          <h2 style="color: #3f2e1f; margin-bottom: 8px;">${product.title}</h2>
          <div style="font-size: 24px; font-weight: bold; color: #6b4f3c; margin-bottom: 16px;">${product.price} ₽</div>
          <div style="margin-bottom: 12px;"><strong>📍 Откуда:</strong> ${product.location}</div>
          <div style="margin-bottom: 12px;"><strong>📝 Описание:</strong><br>${product.description}</div>
          ${product.characteristics ? `<div style="margin-bottom: 12px;"><strong>📋 Характеристики:</strong><br>${product.characteristics}</div>` : ''}
          <button class="btn" id="orderFromDetailBtn" style="margin-top: 16px;">🛒 Заказать</button>
        `;
      }
      
      productDetailContent.innerHTML = renderContent();
      
      // Переключение карусели
      if (images.length > 1) {
        const prevBtn = document.getElementById('prevImage');
        const nextBtn = document.getElementById('nextImage');
        const thumbs = document.querySelectorAll('.carousel-thumb');
        
        function updateCarousel() {
          const mainImg = document.querySelector('.carousel-main');
          if (mainImg) mainImg.src = images[currentImageIndex];
          thumbs.forEach((thumb, idx) => {
            thumb.classList.toggle('active', idx === currentImageIndex);
          });
          const counter = document.querySelector('.carousel-nav span');
          if (counter) counter.textContent = `${currentImageIndex+1} / ${images.length}`;
        }
        
        if (prevBtn) prevBtn.addEventListener('click', () => {
          currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
          updateCarousel();
        });
        if (nextBtn) nextBtn.addEventListener('click', () => {
          currentImageIndex = (currentImageIndex + 1) % images.length;
          updateCarousel();
        });
        thumbs.forEach(thumb => {
          thumb.addEventListener('click', () => {
            currentImageIndex = parseInt(thumb.dataset.index);
            updateCarousel();
          });
        });
      }
      
      document.getElementById('orderFromDetailBtn').addEventListener('click', () => {
        alert('Переход к оформлению заказа пока не готов');
      });
      
      productModal.classList.add('show');
    }

    closeProductModal.addEventListener('click', () => {
      productModal.classList.remove('show');
    });
    productModal.addEventListener('click', (e) => {
      if (e.target === productModal) productModal.classList.remove('show');
    });

    // ---------- ДОБАВЛЕНИЕ ТОВАРА ----------
    submitProductBtn.addEventListener('click', async () => {
      if (!currentUser) {
        addMessage.textContent = '❌ Сначала войдите';
        addMessage.style.color = '#c44';
        return;
      }

      const title = productTitle.value.trim();
      const desc = productDesc.value.trim();
      const specs = productSpecs.value.trim();
      const price = productPrice.value.trim();
      const location = productLocation.value.trim();

      if (!title || !desc || !price || !location) {
        addMessage.textContent = '❌ Заполните все обязательные поля';
        addMessage.style.color = '#c44';
        return;
      }

      if (!agreeCheckbox.checked) {
        addMessage.textContent = '❌ Примите лицензионное соглашение';
        addMessage.style.color = '#c44';
        return;
      }

      if (selectedFiles.length === 0) {
        addMessage.textContent = '❌ Добавьте хотя бы одно фото';
        addMessage.style.color = '#c44';
        return;
      }

      submitProductBtn.disabled = true;
      submitProductBtn.textContent = '⏳ Загружаем...';
      addMessage.textContent = '';

      try {
        const imageUrls = [];
        for (const file of selectedFiles) {
          const fileExt = file.name.split('.').pop();
          const fileName = `${currentUser.id}/${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
          const { error: uploadError } = await supabase.storage
            .from('product-images')
            .upload(fileName, file);
          if (uploadError) throw uploadError;
          
          const { data: urlData } = supabase.storage
            .from('product-images')
            .getPublicUrl(fileName);
          imageUrls.push(urlData.publicUrl);
        }

        const { error: insertError } = await supabase
          .from('products')
          .insert({
            user_id: currentUser.id,
            title,
            description: desc,
            characteristics: specs,
            price: parseFloat(price),
            location,
            image_urls: imageUrls,
            status: 'pending'
          });

        if (insertError) throw insertError;

        addMessage.textContent = '✅ Товар отправлен на модерацию!';
        addMessage.style.color = '#2e7d32';
        
        productTitle.value = '';
        productDesc.value = '';
        productSpecs.value = '';
        productPrice.value = '';
        productLocation.value = '';
        productPhotos.value = '';
        photoPreview.innerHTML = '';
        selectedFiles = [];
        agreeCheckbox.checked = false;
        
        if (document.getElementById('home').classList.contains('active')) {
          loadProducts();
        }
      } catch (error) {
        console.error(error);
        addMessage.textContent = `❌ Ошибка: ${error.message}`;
        addMessage.style.color = '#c44';
      } finally {
        submitProductBtn.disabled = false;
        submitProductBtn.textContent = '🚀 Отправить на модерацию';
      }
    });

    // Автовход
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        const user = session.user;
        supabase.from('users').select('*').eq('email', user.email).maybeSingle().then(({ data: dbUser }) => {
          if (dbUser) {
            currentUser = dbUser;
            loginBtn.style.display = 'none';
            userIconBtn.style.display = 'flex';
            profileName.textContent = dbUser.name;
            loadProducts();
          }
        });
      }
    });
  })();
</script>
</body>
</html>
