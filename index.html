<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Кокос Деливери 🥥</title>
  <style>
    * { box-sizing: border-box; margin: 0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f7f3e9; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 12px; }
    .app { max-width: 520px; width: 100%; background: white; border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid #e9dccd; overflow: hidden; }
    .screen { padding: 24px 20px 30px; }
    .logo { font-size: 28px; font-weight: 700; margin-bottom: 20px; color: #5c3f2b; }
    .logo span:first-child { color: #6b4f3c; } .logo span:last-child { color: #d4a373; }
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; font-weight: 500; color: #5c4432; margin-bottom: 6px; }
    .input-group input { width: 100%; padding: 16px; font-size: 16px; border: 2px solid #ddd2c4; border-radius: 24px; outline: none; background: white; }
    .input-group input:focus { border-color: #b4845c; }
    .tariff-buttons { display: flex; gap: 8px; margin: 20px 0; flex-wrap: wrap; }
    .tariff-btn { flex: 1; background: #f3ede5; border: 2px solid #dacbbc; border-radius: 40px; padding: 14px 0; font-weight: bold; cursor: pointer; text-align: center; user-select: none; }
    .tariff-btn.active { background: #6b4f3c; border-color: #6b4f3c; color: white; }
    .order-textarea { width: 100%; padding: 18px; border: 2px solid #ddd2c4; border-radius: 28px; resize: vertical; margin-bottom: 20px; }
    .btn { background: #3f2e1f; color: white; border: none; font-weight: bold; font-size: 20px; padding: 16px; border-radius: 40px; width: 100%; cursor: pointer; box-shadow: 0 6px 0 #241b13; transition: 0.1s; }
    .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #241b13; }
    .btn:disabled { opacity: 0.6; transform: none; box-shadow: 0 6px 0 #241b13; }
    .success-msg { text-align: center; color: #2e7d32; margin-top: 16px; font-weight: 500; }
    .error-msg { color: #c44; margin: 10px 0; }
    .greeting-fullscreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #efe2d1; display: flex; align-items: center; justify-content: center; font-size: clamp(2.5rem, 15vw, 5rem); font-weight: 800; text-transform: uppercase; color: #5c3f2b; text-shadow: 6px 6px 0 #e3c9b1; z-index: 100; animation: fadeOut 0.5s ease 2s forwards; pointer-events: none; }
    @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .user-icon { background: #f1e9dd; width: 48px; height: 48px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: none; }
    .orders-list { list-style: none; padding: 0; margin-top: 20px; }
    .order-item { background: #faf6f0; padding: 16px; border-radius: 24px; margin-bottom: 12px; border-left: 8px solid #d4a373; }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .order-status { font-size: 14px; padding: 4px 12px; border-radius: 30px; background: #e9dacb; }
    .order-status.pending { background: #fff3cd; color: #856404; }
    .order-status.accepted { background: #d4edda; color: #155724; }
    .order-status.rejected { background: #f8d7da; color: #721c24; }
    .chat-link { color: #b4845c; font-weight: 600; cursor: pointer; text-decoration: underline; }
    .chat-panel { margin-top: 20px; border-top: 2px solid #e9dccd; padding-top: 20px; }
    .chat-messages { max-height: 250px; overflow-y: auto; background: #faf6f0; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
    .chat-msg { margin-bottom: 12px; }
    .chat-msg.user { text-align: right; }
    .chat-msg.owner { text-align: left; }
    .chat-msg span { display: inline-block; padding: 10px 16px; border-radius: 24px; max-width: 80%; }
    .chat-msg.user span { background: #d4a373; color: white; }
    .chat-msg.owner span { background: #e9dacb; color: #3f2e1f; }
    .chat-input { display: flex; gap: 8px; }
    .chat-input input { flex: 1; padding: 14px; border: 2px solid #ddd2c4; border-radius: 30px; }
    .chat-input button { background: #6b4f3c; color: white; border: none; border-radius: 30px; padding: 0 20px; font-weight: bold; }
    .profile-popup { position: absolute; top: 70px; right: 20px; background: white; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); padding: 20px; display: none; border: 1px solid #e9dccd; z-index: 50; }
    .profile-popup.show { display: block; }
    .logout-btn { background: #eee4da; border: none; padding: 12px; border-radius: 40px; width: 100%; font-weight: 600; cursor: pointer; }
    .back-btn { background: none; border: none; color: #b4845c; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app" id="appContainer">
  <!-- ЭКРАН ВХОДА -->
  <div id="loginScreen" class="screen">
    <div class="logo"><span>КОКОС</span><span>ДЕЛИВЕРИ</span></div>
    <div id="emailStep">
      <div class="input-group"><label>Твой Email</label><input type="email" id="loginEmail" placeholder="friend@example.com"></div>
      <button class="btn" id="sendCodeBtn">📧 Получить код</button>
      <div id="emailMessage" style="margin-top: 12px; font-size: 14px;"></div>
    </div>
    <div id="codeStep" style="display: none;">
      <div class="input-group"><label>Код из письма (6 цифр)</label><input type="text" id="loginCode" placeholder="000000" maxlength="6" inputmode="numeric"></div>
      <button class="btn" id="verifyCodeBtn">✅ Подтвердить код</button>
      <div id="codeMessage" style="margin-top: 12px; font-size: 14px;"></div>
      <p style="margin-top: 20px; color: #7f6b58; cursor: pointer;" id="backToEmailBtn">← Назад</p>
    </div>
    <!-- НОВЫЙ ШАГ: ВВОД ИМЕНИ (для новых пользователей) -->
    <div id="nameStep" style="display: none;">
      <div class="input-group"><label>Как тебя зовут?</label><input type="text" id="displayName" placeholder="Тимофей"></div>
      <button class="btn" id="saveNameBtn">🥥 Продолжить</button>
      <div id="nameMessage" style="margin-top: 12px; font-size: 14px;"></div>
    </div>
    <div id="loginError" class="error-msg"></div>
    <p style="margin-top: 20px; color: #7f6b58;">Код придет на почту 🥥</p>
  </div>

  <!-- ГЛАВНЫЙ ЭКРАН -->
  <div id="mainScreen" class="screen" style="display: none;">
    <div class="header">
      <div class="logo"><span>КОКОС</span><span>ДЕЛИВЕРИ</span></div>
      <button class="user-icon" id="userIconBtn">👤</button>
    </div>
    <div id="userGreeting" style="margin-bottom: 16px; font-size: 20px; font-weight: 600; color: #5c3f2b;"></div>
    <div style="text-align: center; margin-bottom: 20px; font-size: 16px; color: #7f6b58; font-style: italic;">🚚 Перевозка товаров от точки А до точки Б</div>
    
    <label style="font-weight:500; color:#5c4432;">Выбери вес</label>
    <div class="tariff-buttons">
      <div class="tariff-btn" data-tariff="25">до 3 кг · 25₽</div>
      <div class="tariff-btn" data-tariff="50">3–5 кг · 50₽</div>
      <div class="tariff-btn active" data-tariff="100">5+ кг · 100₽</div>
    </div>
    <div style="opacity: 0; position: absolute; top: 0; left: 0; height: 0; width: 0; z-index: -1;">
      <input type="text" id="honeypot" name="honeypot" tabindex="-1" autocomplete="off">
    </div>
    <textarea id="orderDesc" class="order-textarea" rows="3" placeholder="Что заказать и куда доставить?"></textarea>
    <button class="btn" id="sendOrderBtn">🚀 Отправить заказ</button>
    <div id="orderMessage" class="success-msg"></div>
    <div id="spamMessage" style="color: #c44; text-align: center; margin-top: 10px; display: none;"></div>

    <h3 style="margin-top: 30px; color:#4e3927;">📋 Мои заказы</h3>
    <ul class="orders-list" id="ordersList"><li style="color:#a28e7a; text-align:center;">Загрузка...</li></ul>

    <div id="chatPanel" class="chat-panel" style="display: none;">
      <button class="back-btn" id="closeChatBtn">← Назад к заказам</button>
      <h4>💬 Чат по заказу</h4>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input"><input type="text" id="chatInput" placeholder="Напиши сообщение..."><button id="sendChatBtn">➤</button></div>
    </div>

    <div class="profile-popup" id="profilePopup">
      <div style="font-weight:bold; font-size:18px; margin-bottom:10px;" id="profileName"></div>
      <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
    </div>
  </div>
  <div id="fullscreenGreeting" class="greeting-fullscreen"></div>
</div>

<script>
  (function(){
    const SUPABASE_URL = 'https://owoksgyuvgvdhqrqnuwf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93b2tzZ3l1dmd2ZGhxcnFudXdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDQ5MTQsImV4cCI6MjA5MTY4MDkxNH0.zhZWb041DDu7IH3_9_FC4cCqYerWz_NXUil5o1jvnVg';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;
    let selectedTariff = 100;
    let currentChatOrderId = null;
    let ordersSubscription = null, messagesSubscription = null, blockSubscription = null;
    let currentEmail = '';
    let pendingAuthUser = null; // временно храним данные после кода

    // DOM элементы
    const loginScreen = document.getElementById('loginScreen');
    const emailStep = document.getElementById('emailStep');
    const codeStep = document.getElementById('codeStep');
    const nameStep = document.getElementById('nameStep');
    const loginEmail = document.getElementById('loginEmail');
    const sendCodeBtn = document.getElementById('sendCodeBtn');
    const emailMessage = document.getElementById('emailMessage');
    const loginCode = document.getElementById('loginCode');
    const verifyCodeBtn = document.getElementById('verifyCodeBtn');
    const codeMessage = document.getElementById('codeMessage');
    const backToEmailBtn = document.getElementById('backToEmailBtn');
    const displayName = document.getElementById('displayName');
    const saveNameBtn = document.getElementById('saveNameBtn');
    const nameMessage = document.getElementById('nameMessage');
    const loginError = document.getElementById('loginError');
    const mainScreen = document.getElementById('mainScreen');
    const userGreeting = document.getElementById('userGreeting');
    const userIconBtn = document.getElementById('userIconBtn');
    const profilePopup = document.getElementById('profilePopup');
    const profileName = document.getElementById('profileName');
    const logoutBtn = document.getElementById('logoutBtn');
    const fullscreenGreeting = document.getElementById('fullscreenGreeting');
    const tariffBtns = document.querySelectorAll('.tariff-btn');
    const orderDesc = document.getElementById('orderDesc');
    const sendOrderBtn = document.getElementById('sendOrderBtn');
    const orderMessage = document.getElementById('orderMessage');
    const spamMessage = document.getElementById('spamMessage');
    const ordersList = document.getElementById('ordersList');
    const chatPanel = document.getElementById('chatPanel');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendChatBtn = document.getElementById('sendChatBtn');
    const closeChatBtn = document.getElementById('closeChatBtn');
    const honeypot = document.getElementById('honeypot');

    function showGreeting(name) {
      fullscreenGreeting.textContent = `ПРИВЕТ, ${name.toUpperCase()}`;
      fullscreenGreeting.style.animation = 'none';
      fullscreenGreeting.offsetHeight;
      fullscreenGreeting.style.animation = 'fadeOut 0.5s ease 2s forwards';
    }

    function subscribeToBlock() {
      if (!currentUser) return;
      if (blockSubscription) supabase.removeChannel(blockSubscription);
      blockSubscription = supabase
        .channel('blocked-check')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'blocked_users', filter: `user_name=eq.${currentUser.name}` }, () => {
          alert('⛔ Ваш аккаунт был заблокирован.');
          logout();
        }).subscribe();
    }

    async function loadOrders() {
      if (!currentUser) return;
      const { data, error } = await supabase.from('orders').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
      if (error) { console.error(error); return; }
      renderOrders(data || []);
    }

    function renderOrders(orders) {
      if (orders.length === 0) { ordersList.innerHTML = '<li style="color:#a28e7a; text-align:center;">Пока заказов нет</li>'; return; }
      let html = '';
      orders.forEach(order => {
        let tariffText = order.tariff === 25 ? 'до 3 кг · 25₽' : (order.tariff === 50 ? '3–5 кг · 50₽' : '5+ кг · 100₽');
        let statusClass = order.status === 'pending' ? 'pending' : (order.status === 'accepted' ? 'accepted' : 'rejected');
        let statusText = order.status === 'pending' ? '🕒 Ожидает' : (order.status === 'accepted' ? '✅ Принят' : '❌ Отклонён');
        html += `<li class="order-item"><div class="order-header"><span><strong>${tariffText}</strong></span><span class="order-status ${statusClass}">${statusText}</span></div><div style="margin-bottom:8px;">${order.description}</div><span class="chat-link" data-order-id="${order.id}">💬 Чат</span></li>`;
      });
      ordersList.innerHTML = html;
      document.querySelectorAll('.chat-link').forEach(link => link.addEventListener('click', (e) => openChat(e.target.dataset.orderId)));
    }

    async function subscribeToOrders() {
      if (!currentUser) return;
      if (ordersSubscription) supabase.removeChannel(ordersSubscription);
      ordersSubscription = supabase.channel('orders-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'orders', filter: `user_id=eq.${currentUser.id}` }, () => loadOrders()).subscribe();
    }

    async function openChat(orderId) {
      currentChatOrderId = orderId;
      chatPanel.style.display = 'block';
      ordersList.style.display = 'none';
      document.querySelector('h3').style.display = 'none';
      await loadMessages();
      if (messagesSubscription) supabase.removeChannel(messagesSubscription);
      messagesSubscription = supabase.channel(`messages-${orderId}`).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `order_id=eq.${orderId}` }, () => loadMessages()).subscribe();
    }

    async function loadMessages() {
      if (!currentChatOrderId) return;
      const { data, error } = await supabase.from('messages').select('*').eq('order_id', currentChatOrderId).order('created_at', { ascending: true });
      if (error) { console.error(error); return; }
      let html = '';
      data.forEach(msg => { const cls = msg.sender_type === 'user' ? 'user' : 'owner'; html += `<div class="chat-msg ${cls}"><span>${msg.text}</span></div>`; });
      chatMessages.innerHTML = html || '<div style="color:#999; text-align:center;">Пока сообщений нет</div>';
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage(text) {
      if (!currentChatOrderId || !text.trim()) return;
      await supabase.from('messages').insert({ order_id: currentChatOrderId, sender_type: 'user', text: text.trim() });
      chatInput.value = '';
    }

    function closeChat() {
      chatPanel.style.display = 'none';
      ordersList.style.display = 'block';
      document.querySelector('h3').style.display = 'block';
      currentChatOrderId = null;
      if (messagesSubscription) supabase.removeChannel(messagesSubscription);
    }

    function logout() {
      supabase.auth.signOut().then(() => {
        currentUser = null; pendingAuthUser = null;
        localStorage.clear();
        if (ordersSubscription) supabase.removeChannel(ordersSubscription);
        if (messagesSubscription) supabase.removeChannel(messagesSubscription);
        if (blockSubscription) supabase.removeChannel(blockSubscription);
        blockSubscription = null;
        loginScreen.style.display = 'block'; mainScreen.style.display = 'none';
        profilePopup.classList.remove('show');
        emailStep.style.display = 'block'; codeStep.style.display = 'none'; nameStep.style.display = 'none';
        loginEmail.value = ''; loginCode.value = ''; displayName.value = '';
      });
    }

    // ----- ВХОД -----
    sendCodeBtn.addEventListener('click', async () => {
      const email = loginEmail.value.trim();
      if (!email) { emailMessage.textContent = '❌ Введи почту'; emailMessage.style.color = '#c44'; return; }
      currentEmail = email;
      emailMessage.textContent = '📤 Отправляю код...'; emailMessage.style.color = '#7f6b58';
      sendCodeBtn.disabled = true;
      const { error } = await supabase.auth.signInWithOtp({ email });
      if (error) {
        emailMessage.textContent = `❌ Ошибка: ${error.message}`; emailMessage.style.color = '#c44';
        sendCodeBtn.disabled = false;
      } else {
        emailMessage.textContent = '✅ Код отправлен! Проверь почту.'; emailMessage.style.color = '#2e7d32';
        emailStep.style.display = 'none'; codeStep.style.display = 'block';
        sendCodeBtn.disabled = false;
      }
    });

    verifyCodeBtn.addEventListener('click', async () => {
      const code = loginCode.value.trim();
      if (!code || code.length !== 6) { codeMessage.textContent = '❌ Введи 6-значный код'; codeMessage.style.color = '#c44'; return; }
      codeMessage.textContent = '🔄 Проверяю код...'; codeMessage.style.color = '#7f6b58';
      verifyCodeBtn.disabled = true;
      const { data, error } = await supabase.auth.verifyOtp({ email: currentEmail, token: code, type: 'email' });
      if (error) {
        codeMessage.textContent = `❌ ${error.message}`; codeMessage.style.color = '#c44';
        verifyCodeBtn.disabled = false;
      } else {
        const user = data.user;
        if (!user) { verifyCodeBtn.disabled = false; return; }
        pendingAuthUser = user;
        // Проверка блокировки
        const { data: blocked } = await supabase.from('blocked_users').select('id').ilike('user_name', user.email).maybeSingle();
        if (blocked) {
          await supabase.auth.signOut();
          loginError.textContent = '⛔ Ваш аккаунт заблокирован.';
          emailStep.style.display = 'block'; codeStep.style.display = 'none';
          verifyCodeBtn.disabled = false; pendingAuthUser = null;
          return;
        }
        // Проверяем, есть ли уже пользователь в таблице users
        const { data: existing } = await supabase.from('users').select('*').eq('email', user.email).maybeSingle();
        if (existing && existing.name) {
          // Пользователь уже есть, просто входим
          currentUser = existing;
          localStorage.setItem('coconutUserId', existing.id);
          finishLogin(existing);
        } else {
          // Новый пользователь или нет имени – показываем поле ввода имени
          codeStep.style.display = 'none';
          nameStep.style.display = 'block';
          // Предлагаем имя из email
          displayName.value = user.email.split('@')[0];
        }
        verifyCodeBtn.disabled = false;
      }
    });

    saveNameBtn.addEventListener('click', async () => {
      const name = displayName.value.trim();
      if (!name) { nameMessage.textContent = '❌ Введи имя'; nameMessage.style.color = '#c44'; return; }
      if (!pendingAuthUser) { nameMessage.textContent = '❌ Сессия истекла, начни заново'; return; }
      saveNameBtn.disabled = true;
      nameMessage.textContent = '⏳ Сохраняю...'; nameMessage.style.color = '#7f6b58';
      // Сохраняем или обновляем пользователя
      const { data: existing } = await supabase.from('users').select('*').eq('email', pendingAuthUser.email).maybeSingle();
      let user = existing;
      if (!user) {
        const { data: newUser, error } = await supabase.from('users').insert({ name, email: pendingAuthUser.email }).select().single();
        if (error) { nameMessage.textContent = '❌ Ошибка сохранения'; saveNameBtn.disabled = false; return; }
        user = newUser;
      } else {
        const { data: updated, error } = await supabase.from('users').update({ name }).eq('id', user.id).select().single();
        if (error) { nameMessage.textContent = '❌ Ошибка обновления'; saveNameBtn.disabled = false; return; }
        user = updated;
      }
      currentUser = user;
      localStorage.setItem('coconutUserId', user.id);
      finishLogin(user);
    });

    function finishLogin(user) {
      showGreeting(user.name);
      loginScreen.style.display = 'none';
      mainScreen.style.display = 'block';
      userGreeting.textContent = `🥥 Привет, ${user.name}!`;
      profileName.textContent = user.name;
      loadOrders();
      subscribeToOrders();
      subscribeToBlock();
      pendingAuthUser = null;
      emailStep.style.display = 'block'; codeStep.style.display = 'none'; nameStep.style.display = 'none';
      loginEmail.value = ''; loginCode.value = ''; displayName.value = '';
    }

    backToEmailBtn.addEventListener('click', () => {
      emailStep.style.display = 'block'; codeStep.style.display = 'none'; nameStep.style.display = 'none';
      loginCode.value = ''; codeMessage.textContent = ''; pendingAuthUser = null;
    });

    loginCode.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyCodeBtn.click(); });
    displayName.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveNameBtn.click(); });

    // ----- ЗАКАЗЫ -----
    tariffBtns.forEach(btn => btn.addEventListener('click', function() {
      tariffBtns.forEach(b => b.classList.remove('active')); this.classList.add('active');
      selectedTariff = parseInt(this.dataset.tariff);
    }));

    sendOrderBtn.addEventListener('click', async () => {
      if (!currentUser) return;
      if (honeypot.value !== '') return;
      const desc = orderDesc.value.trim();
      if (!desc) { orderMessage.textContent = '❌ Напиши что заказать'; orderMessage.style.color = '#c44'; return; }
      const tenMinutesAgo = new Date(Date.now() - 10 * 60 * 1000).toISOString();
      const { data: recent } = await supabase.from('rate_limits').select('id').eq('user_name', currentUser.name).eq('action_type', 'order').gte('created_at', tenMinutesAgo);
      if (recent && recent.length >= 3) { spamMessage.textContent = '⏳ Слишком много заказов. Подожди 10 минут.'; spamMessage.style.display = 'block'; return; }
      spamMessage.style.display = 'none';
      sendOrderBtn.disabled = true; sendOrderBtn.textContent = '📤 Отправляю...';
      await supabase.from('rate_limits').insert({ user_name: currentUser.name, action_type: 'order' });
      const { error } = await supabase.from('orders').insert({ user_id: currentUser.id, description: desc, tariff: selectedTariff, status: 'pending' });
      if (error) { orderMessage.textContent = '❌ Ошибка создания заказа'; orderMessage.style.color = '#c44'; }
      else { orderMessage.textContent = '✅ Заказ создан! Ожидай ответа'; orderMessage.style.color = '#2e7d32'; orderDesc.value = ''; honeypot.value = ''; }
      sendOrderBtn.disabled = false; sendOrderBtn.textContent = '🚀 Отправить заказ';
    });

    userIconBtn.addEventListener('click', (e) => { e.stopPropagation(); profilePopup.classList.toggle('show'); });
    document.addEventListener('click', (e) => { if (!userIconBtn.contains(e.target) && !profilePopup.contains(e.target)) profilePopup.classList.remove('show'); });
    logoutBtn.addEventListener('click', logout);
    closeChatBtn.addEventListener('click', closeChat);
    sendChatBtn.addEventListener('click', () => sendMessage(chatInput.value));
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(chatInput.value); });

    // Автовход
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        const user = session.user;
        supabase.from('users').select('*').eq('email', user.email).maybeSingle().then(({ data: dbUser }) => {
          if (dbUser) {
            supabase.from('blocked_users').select('id').ilike('user_name', user.email).maybeSingle().then(({ data: blocked }) => {
              if (blocked) { supabase.auth.signOut(); return; }
              currentUser = dbUser;
              loginScreen.style.display = 'none'; mainScreen.style.display = 'block';
              userGreeting.textContent = `🥥 Привет, ${dbUser.name}!`;
              profileName.textContent = dbUser.name;
              loadOrders(); subscribeToOrders(); subscribeToBlock();
            });
          }
        });
      }
    });
  })();
</script>
</body>
</html>
